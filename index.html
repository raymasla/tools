    <style>
        :root {
            --bg-color: #0f1014;
            --card-bg: #1a1c23;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            /* 讓容器根據螢幕大小自動延展 */
            width: 85vw;
            max-width: 1200px;
            height: 70vh;
            max-height: 800px;
            
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4vw; /* 間距也會隨螢幕縮放 */
            padding: 4vw;
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn {
            /* 讓按鈕完全填滿網格分配到的空間 */
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            color: white;
            
            /* 字體大小會隨螢幕變化 (最小 18px，建議 2.5vw，最大 36px) */
            font-size: clamp(18px, 2.5vw, 36px);
            font-weight: bold;
            cursor: pointer;
            position: relative;
            z-index: 0;
            border-radius: 20px;
            transition: transform 0.2s ease;
            letter-spacing: 2px;
            
            /* 讓文字始終保持在按鈕正中間 */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 漸層與光暈核心邏輯 */
        .btn::before {
            content: '';
            background: linear-gradient(45deg, var(--color1), var(--color2), var(--color1));
            position: absolute;
            top: -3px; left: -3px;
            background-size: 400%;
            z-index: -1;
            filter: blur(8px);
            width: calc(100% + 6px);
            height: calc(100% + 6px);
            animation: glowing 20s linear infinite;
            opacity: 0;
            transition: opacity .3s ease-in-out;
            border-radius: 20px;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn::after {
            z-index: -1;
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--color1), var(--color2));
            left: 0;
            top: 0;
            border-radius: 20px;
        }

        @keyframes glowing {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        /* 重新設計的按鈕配色 */
        .btn-1 { --color1: #fc00ff; --color2: #00dbde; } /* 電競遊戲風（幻彩紫藍） */
        .btn-2 { --color1: #00ff87; --color2: #60efff; } /* 圖像工具風（極光綠藍） */
        .btn-3 { --color1: #f89b29; --color2: #ff0f7b; } /* 預設 1（暖陽橘） */
        .btn-4 { --color1: #556270; --color2: #ff6b6b; } /* 預設 2（低調灰紅） */
        .btn-5 { --color1: #8E8E8E; --color2: #2828FF; } /*  */
        .btn-6 { --color1: #003D79; --color2: #00CACA; } /*  */
        /* 手機版適應：當螢幕寬度小於 768px 時，自動變成直向一排 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: 85vh;
                padding: 6vw;
                gap: 5vw;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <button class="btn btn-2" onclick="window.location.href='https://raymasla.github.io/image_tool/'">🧰簡易圖像工具🛠️</button>
        
        <button class="btn btn-3" onclick="window.location.href='https://raymasla.github.io/speaker_test/'">📢喇叭頻率製造器</button>
        <button class="btn btn-4" onclick="window.location.href='https://raymasla.github.io/reaction-speed-test/'">⚡反應測試</button>

        <button class="btn btn-5" onclick="window.location.href='https://raymasla.github.io/mic-test/'">🎤麥克風測試</button>
        <button class="btn btn-6" onclick="window.location.href='https://raymasla.github.io/soundcontrol/'">🎵音樂編輯&操控播放</button>

    </div>

</body>
</html>
